<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Executive Brief</title>
  <style>
    /* ───────────────────────────────────────────────── */
    /*  Base / Reset                                      */
    /* ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e4e4e7;
      --muted:     #a1a1aa;
      --accent:    #3b82f6;
      --critical:  #ef4444;
      --high:      #f59e0b;
      --medium:    #3b82f6;
      --low:       #6b7280;
      --success:   #22c55e;
      --radius:    8px;
      --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      padding: 24px;
      max-width: 1060px;
      margin: 0 auto;
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.01em; }
    h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }

    a { color: var(--accent); text-decoration: none; }

    /* ───────────────────────────────────────────────── */
    /*  Header                                            */
    /* ───────────────────────────────────────────────── */
    .brief-header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .classification {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--critical);
      background: rgba(239,68,68,0.12);
      padding: 3px 10px;
      border-radius: 3px;
    }
    .brief-date {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .header-meta {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ───────────────────────────────────────────────── */
    /*  Cards                                             */
    /* ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* ───────────────────────────────────────────────── */
    /*  Executive Summary                                 */
    /* ───────────────────────────────────────────────── */
    .top-line {
      font-size: 1.02rem;
      font-weight: 500;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(59,130,246,0.08);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
    }
    .priority-list { display: flex; flex-direction: column; gap: 10px; }
    .priority-item {
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 4px solid var(--low);
    }
    .priority-item.priority-critical { border-left-color: var(--critical); background: rgba(239,68,68,0.06); }
    .priority-item.priority-high     { border-left-color: var(--high);     background: rgba(245,158,11,0.06); }
    .priority-item.priority-medium   { border-left-color: var(--medium);   background: rgba(59,130,246,0.06); }
    .priority-item.priority-low      { border-left-color: var(--low);      background: rgba(107,114,128,0.06); }

    .priority-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .priority-level {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
    }
    .priority-critical .priority-level { color: var(--critical); }
    .priority-high .priority-level     { color: var(--high); }
    .priority-medium .priority-level   { color: var(--medium); }
    .priority-low .priority-level      { color: var(--low); }

    .priority-title { font-weight: 600; font-size: 0.92rem; }
    .action-required {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--critical);
      border: 1px solid var(--critical);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .priority-summary { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
    .suggested-action { font-size: 0.82rem; color: var(--accent); margin-top: 4px; font-style: italic; }

    /* ───────────────────────────────────────────────── */
    /*  Tables                                            */
    /* ───────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid rgba(42,45,58,0.5); vertical-align: top; }
    tr:last-child td { border-bottom: none; }

    .cal-time { font-weight: 600; white-space: nowrap; color: var(--accent); width: 70px; }
    .cal-title { font-weight: 500; }
    .cal-notes { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ───────────────────────────────────────────────── */
    /*  Stats Row                                         */
    /* ───────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 12px 8px;
    }
    .stat.accent { background: rgba(239,68,68,0.08); }
    .stat-value { display: block; font-size: 1.4rem; font-weight: 700; }
    .stat-label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ───────────────────────────────────────────────── */
    /*  Communications                                    */
    /* ───────────────────────────────────────────────── */
    .comm-list { display: flex; flex-direction: column; gap: 8px; }
    .comm-item {
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 3px solid var(--low);
      background: rgba(255,255,255,0.02);
    }
    .comm-item.priority-critical { border-left-color: var(--critical); }
    .comm-item.priority-high     { border-left-color: var(--high); }
    .comm-item.priority-medium   { border-left-color: var(--medium); }

    .comm-meta { display: flex; gap: 10px; align-items: center; font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
    .comm-type { font-weight: 700; letter-spacing: 0.04em; }
    .comm-from { font-weight: 500; color: var(--text); }
    .comm-age { margin-left: auto; }
    .comm-subject { font-weight: 600; font-size: 0.88rem; }
    .comm-snippet { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    /* ───────────────────────────────────────────────── */
    /*  Projects                                          */
    /* ───────────────────────────────────────────────── */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .project-card {
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 14px;
      border: 1px solid var(--border);
    }
    .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .project-name { font-weight: 600; font-size: 0.9rem; }
    .project-details { font-size: 0.78rem; color: var(--muted); display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }

    /* ───────────────────────────────────────────────── */
    /*  Progress Bar                                      */
    /* ───────────────────────────────────────────────── */
    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      position: relative;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-label {
      position: absolute;
      right: 0;
      top: -18px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* ───────────────────────────────────────────────── */
    /*  Badges                                            */
    /* ───────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--badge-color);
      background: color-mix(in srgb, var(--badge-color) 14%, transparent);
      text-transform: uppercase;
    }
    .health-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ───────────────────────────────────────────────── */
    /*  Fires / All Clear                                 */
    /* ───────────────────────────────────────────────── */
    .all-clear-message {
      text-align: center;
      font-size: 0.95rem;
      padding: 16px;
      color: var(--success);
      background: rgba(34,197,94,0.06);
      border-radius: 6px;
    }

    /* ───────────────────────────────────────────────── */
    /*  Action Items Table                                */
    /* ───────────────────────────────────────────────── */
    .action-table .priority-critical td { border-left: none; }
    .action-table tr.priority-critical { background: rgba(239,68,68,0.04); }
    .action-table tr.priority-high     { background: rgba(245,158,11,0.04); }

    /* ───────────────────────────────────────────────── */
    /*  Agent Status Board                                */
    /* ───────────────────────────────────────────────── */
    .tier-group { margin-bottom: 16px; }
    .tier-header { margin-bottom: 10px; }
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .agent-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
    }
    .agent-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
    .agent-meta { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; }
    .agent-last-report { color: var(--muted); }

    /* ───────────────────────────────────────────────── */
    /*  Error State                                       */
    /* ───────────────────────────────────────────────── */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .error h2 { margin-bottom: 12px; color: var(--critical); }
    .error code { background: var(--surface); padding: 2px 6px; border-radius: 3px; }

    /* ───────────────────────────────────────────────── */
    /*  Responsive                                        */
    /* ───────────────────────────────────────────────── */
    @media (max-width: 640px) {
      body { padding: 12px; }
      .stats-row { flex-wrap: wrap; }
      .stat { min-width: 80px; }
      .header-meta { flex-direction: column; gap: 4px; }
      .project-grid { grid-template-columns: 1fr; }
      .agent-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="text-align:center;padding:80px 20px;color:#a1a1aa;">
      <p>Loading briefing…</p>
    </div>
  </div>
  <script src="src/briefing.js"></script>
</body>
</html>
